<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rhythmer Infographics</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, "Noto Sans KR", sans-serif;
      background: #f5f6f8;
      color: #20242c;
    }

    body {
      margin: 0;
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }

    h1 {
      margin: 0 0 24px;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0;
    }

    figure {
      margin: 0 0 28px;
      background: #ffffff;
      border: 1px solid #d7dce4;
      border-radius: 6px;
      overflow: hidden;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <main>
    <h1>Rhythmer Infographics</h1>
    <figure><img src="images/rhythmer_rating_summary_ko.png" alt="rhythmer_rating_summary_ko"></figure>
    <figure><img src="images/rating_summary_metrics_ko.png" alt="rating_summary_metrics_ko"></figure>
    <figure><img src="images/rating_distribution_ko.png" alt="rating_distribution_ko"></figure>
    <figure><img src="images/rating_distribution_without_total_critique_ko.png" alt="rating_distribution_without_total_critique_ko"></figure>
    <figure><img src="images/category_comparison_ko.png" alt="category_comparison_ko"></figure>
    <figure><img src="images/yearly_trend_ko.png" alt="yearly_trend_ko"></figure>
    <figure><img src="images/yearly_trend_without_total_critique_ko.png" alt="yearly_trend_without_total_critique_ko"></figure>
    <figure><img src="images/reviewer_leaderboard_ko.png" alt="reviewer_leaderboard_ko"></figure>
    <figure><img src="images/reviewer_total_votes_ko.png" alt="reviewer_total_votes_ko"></figure>
    <figure><img src="images/reviewer_average_votes_ko.png" alt="reviewer_average_votes_ko"></figure>
    <figure><img src="images/reviewer_total_views_ko.png" alt="reviewer_total_views_ko"></figure>
    <figure><img src="images/reviewer_average_views_ko.png" alt="reviewer_average_views_ko"></figure>
    <figure><img src="images/total_views_by_year_ko.png" alt="total_views_by_year_ko"></figure>
    <figure><img src="images/average_views_by_year_ko.png" alt="average_views_by_year_ko"></figure>
    <figure><img src="images/total_views_by_category_ko.png" alt="total_views_by_category_ko"></figure>
    <figure><img src="images/average_views_by_category_ko.png" alt="average_views_by_category_ko"></figure>
  </main>
</body>
</html>
